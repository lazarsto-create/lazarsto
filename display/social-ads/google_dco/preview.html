<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ads Preview</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: #f3f4f6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .preview-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 24px;
    }

    /* ── toolbar ── */
    .toolbar-container {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      padding: 10px 14px;
      position: sticky;
      top: 24px;
      z-index: 100;
      width: 100%;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
    }
    .toolbar-title { font-weight: 700; margin-right: 8px; }
    .toolbar label  { font-weight: 500; }
    .toolbar select {
      font-size: 12px; padding: 3px 6px;
      border-radius: 4px; border: 1px solid #d1d5db; background: #ffffff;
    }
    #cta-input {
      font-size: 12px; padding: 3px 6px;
      border-radius: 4px; border: 1px solid #d1d5db; width: 70px;
    }
    .toolbar button {
      font-size: 11px; padding: 3px 8px;
      border-radius: 4px; border: 1px solid #d1d5db;
      background: #f9fafb; cursor: pointer;
    }
    .toolbar button:hover { background: #eef2ff; }

    /* ── rows ── */
    .ads-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
      justify-content: center;
    }
    .ads-row.landscape {
      flex-direction: column;
      align-items: center;
    }

    /* ── ad card ── */
    .ad-container {
      min-width: 0;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ad-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ad-header h2 {
      margin: 0; font-size: 14px; font-weight: 700; color: #374151;
    }
    .replay-ad-button {
      font-size: 18px; padding: 4px 8px;
      border-radius: 4px; border: 1px solid #d1d5db;
      background: #ffffff; color: #000; cursor: pointer; line-height: 1;
      flex-shrink: 0;
    }
    .replay-ad-button:hover { background: #f3f4f6; border-color: #9ca3af; }

    /* ── scale mechanics ── */
    .ad-scale-outer {
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    .ad-scale-wrapper {
      transform-origin: top center;
      display: block;
      margin: 0 auto;
    }
    .ad-frame {
      border: 0;
      overflow: hidden;
      display: block;
    }
  </style>
</head>
<body>
  <div class="preview-shell" id="preview-shell">
    <div class="toolbar-container">
      <div class="toolbar-left">
        <span class="toolbar-title">Feed preview</span>
        <label for="csv-select">CSV:</label>
        <select id="csv-select"></select>
        <label for="products-select">Products:</label>
        <select id="products-select">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <label for="cta-input">CTA:</label>
        <input id="cta-input" type="text" placeholder="Shop Now" />
        <label for="header-image-select">Header image:</label>
        <select id="header-image-select"></select>
        <button id="header-button" type="button">Upload…</button>
        <input id="header-file" type="file" accept="image/*" style="display:none" />
        <label for="header-video-select">Header video:</label>
        <select id="header-video-select"></select>
        <button id="header-video-button" type="button">Upload…</button>
        <input id="header-video-file" type="file" accept="video/*" style="display:none" />
        <label for="profile-id-input" style="margin-left:8px;">Profile ID:</label>
        <input id="profile-id-input" type="text" placeholder="10960105" style="font-size:12px;padding:3px 6px;border-radius:4px;border:1px solid #d1d5db;width:90px;" />
        <button id="download-zip-btn" type="button" style="margin-left:12px;background:#111827;color:#fff;border-color:#111827;font-weight:600;">⬇ Download ZIP</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {

      const shell = document.getElementById('preview-shell');

      // ── load ad list from manifest ────────────────────────────
      let adSizes = [];
      try {
        const res = await fetch('ads/list.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        adSizes = await res.json();
      } catch (e) {
        shell.insertAdjacentHTML('beforeend',
          `<p style="color:red;padding:16px">Could not load ads/list.json: ${e.message}</p>`);
        return;
      }

      // ── group into rows ───────────────────────────────────────
      // portrait  (h >= w): group in pairs, side by side
      // landscape (w >  h): group in pairs, side by side
      function isPortrait(size) {
        const [w, h] = size.split('x').map(Number);
        return h >= w;
      }
      function chunk(arr, n) {
        const out = [];
        for (let i = 0; i < arr.length; i += n) out.push(arr.slice(i, i + n));
        return out;
      }

      const portrait  = adSizes.filter(s =>  isPortrait(s));
      const landscape = adSizes.filter(s => !isPortrait(s));

      // portrait ads all in one row (nowrap, scale down together)
      // landscape ads each in their own row
      const rows = [
        ...(portrait.length  ? [{ sizes: portrait,  cls: '' }]              : []),
        ...landscape.map(s  => ({ sizes: [s],        cls: 'landscape' })),
      ];

      rows.forEach(group => {
        const row = document.createElement('div');
        row.className = ('ads-row ' + group.cls).trim();

        group.sizes.forEach(size => {
          const [adW, adH] = size.split('x').map(Number);
          const container = document.createElement('div');
          container.className = 'ad-container';
          container.innerHTML = `
            <div class="ad-header">
              <h2>Ad Preview – ${size}</h2>
              <button class="replay-ad-button" data-ad="${size}">↻</button>
            </div>
            <div class="ad-scale-outer">
              <div class="ad-scale-wrapper" data-ad-width="${adW}" data-ad-height="${adH}">
                <iframe
                  class="ad-frame"
                  data-size="${size}"
                  src="ads/${size}/index.html"
                  width="${adW}"
                  height="${adH}"
                  scrolling="no"
                ></iframe>
              </div>
            </div>
          `;
          row.appendChild(container);
        });

        shell.appendChild(row);
      });

      // ── scaling (shrink only, never upscale) ─────────────────
      function scaleAds() {
        document.querySelectorAll('.ad-scale-wrapper').forEach(wrapper => {
          const adW   = parseInt(wrapper.dataset.adWidth);
          const adH   = parseInt(wrapper.dataset.adHeight);
          const outer = wrapper.parentElement;
          const available = outer.clientWidth;
          if (!available) return;
          const scale = Math.min(1, available / adW);
          wrapper.style.width     = adW + 'px';
          wrapper.style.height    = adH + 'px';
          wrapper.style.transform = scale < 1 ? `scale(${scale})` : '';
          outer.style.height      = (adH * scale) + 'px';
        });
      }

      window.addEventListener('resize', scaleAds);
      requestAnimationFrame(() => requestAnimationFrame(scaleAds));

      // ── toolbar wiring ────────────────────────────────────────
      const csvSelect         = document.getElementById('csv-select');
      const productsSelect    = document.getElementById('products-select');
      const ctaInput          = document.getElementById('cta-input');
      const headerButton      = document.getElementById('header-button');
      const headerFile        = document.getElementById('header-file');
      const headerVideoButton = document.getElementById('header-video-button');
      const headerVideoFile   = document.getElementById('header-video-file');
      const adFrames          = document.querySelectorAll('.ad-frame');

      // persisted header media state
      let headerMediaUrl  = null;  // blob URL
      let headerMediaType = null;  // 'image' | 'video'

      function applyHeaderMedia(doc) {
        if (!headerMediaUrl) return;
        const img   = doc.querySelector('.table-img img');
        const video = doc.querySelector('.table-img .header-video');
        if (!img || !video) return;
        if (headerMediaType === 'image') {
          img.src = headerMediaUrl;
          img.style.display   = 'block';
          video.style.display = 'none';
        } else {
          video.src = headerMediaUrl;
          video.style.display = 'block';
          img.style.display   = 'none';
          video.currentTime = 0;
          video.onloadedmetadata = () => {
            const plays = Math.floor(30 / video.duration);
            let count = 0;
            video.loop = false;
            video.onended = plays > 1 ? () => {
              count++;
              if (count < plays) { video.currentTime = 0; video.play().catch(() => {}); }
            } : null;
            video.play().catch(() => {});
          };
        }
      }

      function reloadFrame(iframe) {
        iframe.onload = () => {
          applyHeaderMedia(iframe.contentWindow.document);
          iframe.onload = null;
        };
        iframe.src = iframe.src;
      }

      function reloadAds() {
        adFrames.forEach(f => { if (f) reloadFrame(f); });
      }

      document.querySelectorAll('.replay-ad-button').forEach(btn => {
        btn.onclick = function () {
          const iframe = document.querySelector(`.ad-frame[data-size="${this.dataset.ad}"]`);
          if (iframe) reloadFrame(iframe);
        };
      });

      function withAdDocs(cb) {
        adFrames.forEach(f => {
          if (!f || !f.contentWindow) return;
          const doc = f.contentWindow.document;
          if (doc && (doc.readyState === 'complete' || doc.readyState === 'interactive')) {
            cb(doc);
          } else {
            f.onload = () => cb(f.contentWindow.document);
          }
        });
      }

      if (csvSelect) {
        // load csv list from manifest
        try {
          const res = await fetch('csv/list.json');
          if (res.ok) {
            const csvFiles = await res.json();
            csvFiles.forEach(file => {
              const opt = document.createElement('option');
              opt.value = `csv/${file}`;
              opt.textContent = file.replace(/\.csv$/i, '').replace(/[-_]/g, ' ');
              csvSelect.appendChild(opt);
            });
          }
        } catch (e) {
          console.warn('Could not load csv/list.json', e);
        }
        const savedCsv = localStorage.getItem('adCsvPath') || (csvSelect.options[0]?.value ?? '');
        if (savedCsv) csvSelect.value = savedCsv;
        csvSelect.onchange = () => {
          localStorage.setItem('adCsvPath', csvSelect.value);
          reloadAds();
        };
      }

      if (productsSelect) {
        productsSelect.value = parseInt(localStorage.getItem('adProducts')) || 3;
        productsSelect.onchange = () => {
          localStorage.setItem('adProducts', productsSelect.value);
          reloadAds();
        };
      }

      if (ctaInput) {
        ctaInput.value = localStorage.getItem('adCtaText') || 'Shop Now';
        const applyCta = () => {
          withAdDocs(doc => {
            const span = doc.querySelector('.cta-text');
            const cta  = doc.querySelector('.cta');
            if (span) span.textContent = ctaInput.value;
            if (cta)  cta.style.display = ctaInput.value.trim() ? 'inline-block' : 'none';
          });
        };
        ctaInput.oninput = () => { localStorage.setItem('adCtaText', ctaInput.value); applyCta(); };
        applyCta();
      }

      const headerImageSelect = document.getElementById('header-image-select');
      if (headerImageSelect) {
        try {
          const res = await fetch('header_images/list.json');
          if (res.ok) {
            const imgs = await res.json();
            const none = document.createElement('option');
            none.value = ''; none.textContent = '— none —';
            headerImageSelect.appendChild(none);
            imgs.forEach(file => {
              const opt = document.createElement('option');
              opt.value = `header_images/${file}`;
              opt.textContent = file.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
              headerImageSelect.appendChild(opt);
            });
          }
        } catch(e) { console.warn('Could not load header_images/list.json', e); }
        headerImageSelect.onchange = () => {
          if (!headerImageSelect.value) return;
          headerMediaUrl  = new URL(headerImageSelect.value, window.location.href).href;
          headerMediaType = 'image';
          withAdDocs(doc => applyHeaderMedia(doc));
        };
      }

      if (headerButton && headerFile) {
        headerButton.onclick = () => headerFile.click();
        headerFile.onchange = () => {
          const file = headerFile.files[0];
          if (!file) return;
          headerMediaUrl  = URL.createObjectURL(file);
          headerMediaType = 'image';
          headerImageSelect.value = '';
          withAdDocs(doc => applyHeaderMedia(doc));
        };
      }

      const headerVideoSelect = document.getElementById('header-video-select');
      if (headerVideoSelect) {
        try {
          const res = await fetch('header_video/list.json');
          if (res.ok) {
            const vids = await res.json();
            const none = document.createElement('option');
            none.value = ''; none.textContent = '— none —';
            headerVideoSelect.appendChild(none);
            vids.forEach(file => {
              const opt = document.createElement('option');
              opt.value = `header_video/${file}`;
              opt.textContent = file.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
              headerVideoSelect.appendChild(opt);
            });
          }
        } catch(e) { console.warn('Could not load header_video/list.json', e); }
        headerVideoSelect.onchange = () => {
          if (!headerVideoSelect.value) return;
          headerMediaUrl  = new URL(headerVideoSelect.value, window.location.href).href;
          headerMediaType = 'video';
          withAdDocs(doc => applyHeaderMedia(doc));
        };
      }

      if (headerVideoButton && headerVideoFile) {
        headerVideoButton.onclick = () => headerVideoFile.click();
        headerVideoFile.onchange = () => {
          const file = headerVideoFile.files[0];
          if (!file) return;
          headerMediaUrl  = URL.createObjectURL(file);
          headerMediaType = 'video';
          if (headerVideoSelect) headerVideoSelect.value = '';
          withAdDocs(doc => applyHeaderMedia(doc));
        };
      }

      // ── Helpers: transform files for Google Studio DCO ────────

      function transformIndexHtmlForStudio(html, adW, adH, profileId) {
        let r = html;

        // 1. Remove localStorage init block — Studio doesn't use it
        r = r.replace(/<script>\s*\/\/\s*default values[\s\S]*?<\/script>/,
          '<script>\n  window.ctaText = "Shop Now";\n<' + '/script>');

        // 2. Add required ad.size meta tag
        r = r.replace(/(<meta charset="utf-8"[^>]*>)/i,
          '$1\n  <meta name="ad.size" content="width=' + adW + ',height=' + adH + '">');

        // 3. Build Enabler.js script tag + setProfileId block (closing tag split to avoid parser issues)
        const enablerTag  = '<script src="https://s0.2mdn.net/ads/studio/Enabler.js"><' + '/script>';
        const profileTag  = '<script>Enabler.setProfileId(' + profileId + ');<' + '/script>';
        r = r.replace(/(<head[^>]*>)/i, '$1\n  ' + enablerTag + '\n  ' + profileTag);

        // 4. Replace GSAP CDN with locally bundled file
        r = r.replace('https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js', 'gsap.min.js');

        return r;
      }

      function transformAnimationJsForStudio(src) {
        // Extract only the carousel/UI code — everything after selectedItems is built
        const MARKER = 'window.selectedItems = selectedItems;';
        const markerIdx = src.indexOf(MARKER);
        if (markerIdx === -1) return src;

        const afterMarker = src.substring(markerIdx + MARKER.length);
        const autoIdx = afterMarker.lastIndexOf('startAuto();');
        if (autoIdx === -1) return src;
        let carouselCode = afterMarker.substring(0, autoIdx + 'startAuto();'.length);

        // Replace click handlers: window.open -> Enabler.exitOverride (for dynamic DCO URLs)
        carouselCode = carouselCode.replace(
          /window\.open\s*\(\s*url\s*,\s*'_blank'\s*\)/g,
          "Enabler.exitOverride('Background Exit', url)"
        );
        // Set href to '#' — actual navigation handled by Enabler.exitOverride
        carouselCode = carouselCode.replace(/adClickArea\.href\s*=\s*item\.url\s*;/g, "adClickArea.href = '#';");
        carouselCode = carouselCode.replace(/adClickArea\.href\s*=\s*url\s*;/g,       "adClickArea.href = '#';");

        // Studio dynamicContent structure (from Google Studio generated code):
        //   dynamicContent.feedName[rowIndex].URL.Url        <- URL is an object with .Url
        //   dynamicContent.feedName[rowIndex].productImage.Url
        //   dynamicContent.feedName[rowIndex].Headline       <- plain string
        //   dynamicContent.feedName[rowIndex].Description
        //   dynamicContent.feedName[rowIndex].price
        //
        // Feed array name (e.g. "ikeaFoodcontainers_Sheet1") is auto-detected at runtime.

        const newSrc = [
          '(function () {',
          '  function init() {',
          '    try {',
          '      var dc = dynamicContent;',
          '      // Auto-detect feed array (first array property in dynamicContent)',
          '      var feedKey = Object.keys(dc).find(function(k) { return Array.isArray(dc[k]); });',
          '      var rows = feedKey ? dc[feedKey] : [];',
          '      var allItems = [];',
          '      for (var i = 0; i < rows.length; i++) {',
          '        var row = rows[i];',
          '        var img = row.productImage && row.productImage.Url ? row.productImage.Url : "";',
          '        if (!img) continue;',
          '        allItems.push({',
          '          image3:  img,',
          '          data8:   row.Headline    || "",',
          '          price16: row.Description || "",',
          '          price4:  row.price       || "",',
          '          url:     row.URL && row.URL.Url ? row.URL.Url : ""',
          '        });',
          '      }',
          '      var images = allItems;',
          '      window.images = images;',
          '      function getRandomItems(arr, n) {',
          '        var out = [], copy = arr.slice(), c = Math.min(n, copy.length);',
          '        for (var j = 0; j < c; j++) out.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0]);',
          '        return out;',
          '      }',
          '      var selectedItems = getRandomItems(images, Math.max(1, Math.min(5, images.length)));',
          '      window.selectedItems = selectedItems;',
          carouselCode,
          '    } catch (err) { console.warn("Ad init error", err); }',
          '  }',
          '  if (Enabler.isInitialized()) {',
          '    init();',
          '  } else {',
          '    Enabler.addEventListener(studio.events.StudioEvent.INIT, init);',
          '  }',
          '})();'
        ].join('\n');

        return newSrc;
      }

      // ── Download ZIP (Google Studio DCO ready) ────────────────
      const downloadZipBtn = document.getElementById('download-zip-btn');
      if (downloadZipBtn) {
        downloadZipBtn.onclick = async () => {
          downloadZipBtn.disabled = true;
          downloadZipBtn.textContent = '⏳ Zipping…';
          try {
            const profileId = (document.getElementById('profile-id-input').value || '').trim() || '0';

            // Bundle GSAP locally — Studio may block external CDNs
            let gsapJs = null;
            try {
              const gr = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js');
              if (gr.ok) gsapJs = await gr.text();
            } catch (e) { console.warn('GSAP bundle fetch failed', e); }

            // Minimal 1×1 white PNG — Studio requires a backup.png fallback
            const backupB64 = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg==';

            // Master ZIP contains one inner ZIP per ad size (upload each to Studio separately)
            const masterZip = new JSZip();
            const adFiles = ['index.html', 'style.css', 'animation.js', 'arrow.svg', 'ikea.svg',
                             'fonts/Noto IKEA Latin Bold.woff2', 'fonts/Noto IKEA Latin Regular.woff2'];

            for (const size of adSizes) {
              const [adW, adH] = size.split('x').map(Number);
              const sizeZip = new JSZip(); // separate ZIP per size for Studio upload

              for (const filePath of adFiles) {
                try {
                  const res = await fetch(`ads/${size}/${filePath}`);
                  if (!res.ok) continue;

                  if (filePath === 'index.html') {
                    sizeZip.file('index.html',
                      transformIndexHtmlForStudio(await res.text(), adW, adH, profileId));
                  } else if (filePath === 'animation.js') {
                    sizeZip.file('animation.js',
                      transformAnimationJsForStudio(await res.text()));
                  } else {
                    const isBinary = filePath.endsWith('.woff2');
                    const data = isBinary ? await res.arrayBuffer() : await res.text();
                    if (filePath.startsWith('fonts/')) {
                      sizeZip.folder('fonts').file(filePath.replace('fonts/', ''), data);
                    } else {
                      sizeZip.file(filePath, data);
                    }
                  }
                } catch (e) { /* skip missing files */ }
              }

              if (gsapJs) sizeZip.file('gsap.min.js', gsapJs);
              sizeZip.file('backup.png', backupB64, { base64: true });

              // Add inner ZIP to master (named by size)
              const sizeBlob = await sizeZip.generateAsync({
                type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 }
              });
              masterZip.file(`${size}.zip`, sizeBlob);
            }

            const blob = await masterZip.generateAsync({
              type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 }
            });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'google-studio-dco-ads.zip';
            a.click();
            URL.revokeObjectURL(a.href);
          } catch (err) {
            alert('ZIP generation failed: ' + err.message);
          } finally {
            downloadZipBtn.disabled = false;
            downloadZipBtn.textContent = '⬇ Download ZIP';
          }
        };
      }
    });
  </script>
</body>
</html>
