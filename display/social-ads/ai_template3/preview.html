<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IKEA Display Ads Preview</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: #f3f4f6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background 0.3s ease;
    }

    /* ── IKEA toolbar ── */
    .toolbar-container {
      background: #0058a3;
      padding: 0 20px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .toolbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 0;
      max-width: 1600px;
      margin: 0 auto;
    }
    .toolbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .ikea-logo {
      background: #FFDB00;
      color: #0058a3;
      font-size: 16px;
      font-weight: 900;
      padding: 4px 10px;
      border-radius: 3px;
      letter-spacing: 1px;
      line-height: 1.2;
    }
    .toolbar-brand-text {
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      opacity: 0.9;
    }
    .toolbar-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .toolbar-group label {
      color: rgba(255,255,255,0.8);
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    .toolbar-group select,
    .toolbar-group input[type="text"] {
      font-size: 12px;
      padding: 4px 7px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      outline: none;
      cursor: pointer;
    }
    .toolbar-group select option { color: #111; background: #fff; }
    .toolbar-group select:hover,
    .toolbar-group input[type="text"]:hover { border-color: rgba(255,255,255,0.6); }
    .toolbar-group input[type="text"]::placeholder { color: rgba(255,255,255,0.5); }

    /* Background switcher */
    .bg-switcher {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .bg-btn {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .bg-btn:hover { border-color: #FFDB00; transform: scale(1.15); }
    .bg-btn.active { border-color: #FFDB00; }
    .bg-btn.bg-white  { background: #ffffff; }
    .bg-btn.bg-gray   { background: #f3f4f6; }
    .bg-btn.bg-dark   { background: #1a1a2e; }

    /* toolbar actions */
    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn-replay-all {
      background: #FFDB00;
      color: #0058a3;
      border: none;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-replay-all:hover { background: #ffe933; }

    /* ── shell ── */
    .preview-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      padding-top: 82px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── rows ── */
    .ads-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
      justify-content: center;
    }

    /* ── ad card ── */
    .ad-container {
      flex-shrink: 0;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.09);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ad-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .ad-title-block { flex: 1; min-width: 0; }
    .ad-title-block h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: #0058a3;
      white-space: nowrap;
    }
    .ad-title-block .ad-placement {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }
    .ad-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .replay-ad-button {
      font-size: 15px;
      width: 26px; height: 26px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #374151;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
      flex-shrink: 0;
    }
    .replay-ad-button:hover { background: #e0edff; border-color: #0058a3; color: #0058a3; }

    /* ── scale & wrapper ── */
    .ad-scale-outer {
      overflow: hidden;
      position: relative;
    }
    .ad-scale-wrapper {
      display: block;
      position: relative;
    }
    .ad-frame {
      border: 0;
      overflow: hidden;
      display: block;
    }

    /* ── loading spinner ── */
    .ad-loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      border-radius: 2px;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .ad-loader.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: #0058a3;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


    /* ── ad footer note ── */
    .ad-note {
      font-size: 11px;
      color: #9ca3af;
      font-style: italic;
      text-align: center;
      padding-top: 2px;
    }

    /* ── dark background adjustments ── */
    body.bg-dark {
      background: #1a1a2e;
    }
    body.bg-dark .ad-container {
      background: #252540;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    body.bg-dark .ad-title-block h2 { color: #60a5fa; }
    body.bg-dark .ad-placement { color: #9ca3af; }
    body.bg-dark .replay-ad-button {
      background: #1a1a2e; border-color: #374151; color: #d1d5db;
    }
    body.bg-dark .ad-note { color: #6b7280; }

    body.bg-white { background: #ffffff; }
    body.bg-gray  { background: #f3f4f6; }
  </style>
</head>
<body class="bg-gray">

  <!-- ── IKEA Toolbar ── -->
  <div class="toolbar-container">
    <div class="toolbar-inner">

      <!-- brand -->
      <div class="toolbar-brand">
        <div class="ikea-logo">IKEA</div>
        <span class="toolbar-brand-text">Display Ads Preview</span>
      </div>

      <!-- controls -->
      <div class="toolbar-controls">

        <div class="toolbar-group">
          <label>Collection:</label>
          <select id="csv-select"></select>
        </div>

        <div class="toolbar-group">
          <label>Products:</label>
          <select id="products-select">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </div>

        <div class="toolbar-group">
          <label>CTA:</label>
          <input id="cta-input" type="text" placeholder="Shop Now" style="width:110px;" />
        </div>

        <div class="toolbar-group">
          <label>Header image:</label>
          <select id="header-image-select"></select>
        </div>

        <div class="toolbar-group">
          <label>Header video:</label>
          <select id="header-video-select"></select>
        </div>

        <div class="toolbar-group">
          <label>Background:</label>
          <div class="bg-switcher">
            <div class="bg-btn bg-white" data-bg="bg-white" title="White"></div>
            <div class="bg-btn bg-gray active" data-bg="bg-gray" title="Gray"></div>
            <div class="bg-btn bg-dark" data-bg="bg-dark" title="Dark"></div>
          </div>
        </div>

      </div>

      <!-- actions -->
      <div class="toolbar-actions">
        <button class="btn-replay-all" id="btn-replay-all">↻ Replay all</button>
      </div>

    </div>
  </div>

  <!-- ── Ad shell ── -->
  <div class="preview-shell" id="preview-shell"></div>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {

      const shell = document.getElementById('preview-shell');

      // ── IAB dimension names ───────────────────────────────────────
      const iabNames = {
        '160x600': 'Wide Skyscraper',
        '300x250': 'Medium Rectangle',
        '300x600': 'Half Page',
        '728x90':  'Leaderboard',
        '970x250': 'Billboard',
      };

      // ── Placement descriptions ────────────────────────────────────
      const placementNotes = {
        '160x600': 'Sidebars on news portals and blogs',
        '300x250': 'News portals, blogs, email newsletters',
        '300x600': 'Premium placements, side panel',
        '728x90':  'Top and bottom of page, below navigation',
        '970x250': 'Premium, above the fold, homepage',
      };

      // ── CSV human labels ──────────────────────────────────────────
      const csvLabels = {
        'ikea-Tables':           'Tables',
        'ikea-Food-containers':  'Food Containers',
        'ikea-garden-furniture': 'Garden Furniture',
      };

      function csvLabel(filename) {
        const key = filename.replace(/\.csv$/i, '');
        return csvLabels[key] || key.replace(/[-_]/g, ' ');
      }

      // ── fetch helper: try PHP first, fall back to list.json ──────
      async function fetchList(dir) {
        // Try dynamic PHP endpoint first (local Apache)
        try {
          const r = await fetch(`filelist.php?dir=${dir}`);
          if (r.ok) {
            const text = await r.text();
            // PHP may return HTML 404 page — detect by first char
            if (text.trimStart().startsWith('[') || text.trimStart().startsWith('"')) {
              return JSON.parse(text);
            }
          }
        } catch (_) {}
        // Fall back to static list.json (GitHub Pages / any static host)
        const r2 = await fetch(`${dir}/list.json`);
        if (!r2.ok) throw new Error(`HTTP ${r2.status} loading ${dir}/list.json`);
        return r2.json();
      }

      // ── load ad list ──────────────────────────────────────────────
      let adSizes = [];
      try {
        adSizes = await fetchList('ads');
      } catch (e) {
        shell.insertAdjacentHTML('beforeend',
          `<p style="color:red;padding:16px">Could not load ad list: ${e.message}</p>`);
        return;
      }

      // ── build ad cards ────────────────────────────────────────────
      function isPortrait(size) {
        const [w, h] = size.split('x').map(Number);
        return h >= w;
      }

      const portrait  = adSizes.filter(s =>  isPortrait(s));
      const landscape = adSizes.filter(s => !isPortrait(s));
      // Portrait/square ads share one row (wrap if screen is narrow).
      // Each landscape/horizontal ad gets its own full-width row.
      const rows = [
        ...(portrait.length ? [{ sizes: portrait, cls: '' }] : []),
        ...landscape.map(s  => ({ sizes: [s],     cls: '' })),
      ];

      rows.forEach(group => {
        const row = document.createElement('div');
        row.className = ('ads-row ' + group.cls).trim();

        group.sizes.forEach(size => {
          const [adW, adH] = size.split('x').map(Number);
          const iab   = iabNames[size]       || size;
          const note  = placementNotes[size] || '';

          const container = document.createElement('div');
          container.className = 'ad-container';
          container.innerHTML = `
            <div class="ad-header">
              <div class="ad-title-block">
                <h2>${iab} &mdash; ${adW}&times;${adH}</h2>
                <div class="ad-placement">${note}</div>
              </div>
              <div class="ad-controls">
                <button class="replay-ad-button" data-ad="${size}" title="Replay">↻</button>
              </div>
            </div>
            <div class="ad-scale-outer">
              <div class="ad-scale-wrapper" data-ad-width="${adW}" data-ad-height="${adH}" data-ad="${size}">
                <iframe
                  class="ad-frame"
                  data-size="${size}"
                  src="ads/${size}/index.html"
                  width="${adW}"
                  height="${adH}"
                  scrolling="no"
                ></iframe>
<div class="ad-loader" id="loader-${size}">
                  <div class="spinner"></div>
                </div>
              </div>
            </div>
            <div class="ad-note">${adW} × ${adH} px</div>
          `;
          row.appendChild(container);
        });

        shell.appendChild(row);
      });

      // ── loader: hide when iframe loaded ──────────────────────────
      document.querySelectorAll('.ad-frame').forEach(iframe => {
        const loader = document.getElementById('loader-' + iframe.dataset.size);
        iframe.addEventListener('load', () => {
          if (loader) loader.classList.add('hidden');
        });
      });

      // ── set wrapper & outer to natural ad dimensions ─────────────
      document.querySelectorAll('.ad-scale-wrapper').forEach(w => {
        const adW = parseInt(w.dataset.adWidth);
        const adH = parseInt(w.dataset.adHeight);
        w.style.width  = adW + 'px';
        w.style.height = adH + 'px';
        const outer = w.parentElement;
        outer.style.width  = adW + 'px';
        outer.style.height = adH + 'px';
      });

      // ── toolbar refs ──────────────────────────────────────────────
      const csvSelect         = document.getElementById('csv-select');
      const productsSelect    = document.getElementById('products-select');
      const ctaInput          = document.getElementById('cta-input');
      const headerImageSelect = document.getElementById('header-image-select');
      const headerVideoSelect = document.getElementById('header-video-select');
      const adFrames          = document.querySelectorAll('.ad-frame');

      // ── header media ──────────────────────────────────────────────
      function applyHeaderMedia(doc, url, type) {
        const img   = doc.querySelector('.table-img img');
        const video = doc.querySelector('.table-img .header-video');
        if (!img && !video) return;
        if (type === 'video' && url) {
          if (video) { video.src = url; video.style.display = 'block'; video.currentTime = 0; video.onloadedmetadata = () => video.play().catch(() => {}); }
          if (img)   { img.style.display = 'none'; }
        } else if (type === 'image' && url) {
          if (img)   { img.src = url; img.style.display = 'block'; }
          if (video) { video.pause(); video.style.display = 'none'; }
        }
      }

      function applyCurrentHeaderMedia(doc) {
        const videoVal = headerVideoSelect.value;
        const imageVal = headerImageSelect.value;
        if (videoVal)      applyHeaderMedia(doc, '../../header_video/'  + videoVal, 'video');
        else if (imageVal) applyHeaderMedia(doc, '../../header_images/' + imageVal, 'image');
      }

      function reloadFrame(iframe) {
        const loader = document.getElementById('loader-' + iframe.dataset.size);
        if (loader) loader.classList.remove('hidden');
        iframe.onload = () => {
          applyCurrentHeaderMedia(iframe.contentWindow.document);
          iframe.onload = null;
        };
        iframe.src = iframe.src;
      }

      function reloadAds() { adFrames.forEach(f => { if (f) reloadFrame(f); }); }

      function withAdDocs(cb) {
        adFrames.forEach(f => {
          if (!f || !f.contentWindow) return;
          const doc = f.contentWindow.document;
          if (doc && (doc.readyState === 'complete' || doc.readyState === 'interactive')) cb(doc);
          else f.onload = () => cb(f.contentWindow.document);
        });
      }

      // replay per-ad
      document.addEventListener('click', function (e) {
        const rBtn = e.target.closest('.replay-ad-button');
        if (!rBtn) return;
        const iframe = document.querySelector(`.ad-frame[data-size="${rBtn.dataset.ad}"]`);
        if (iframe) reloadFrame(iframe);
      });

      // replay all
      document.getElementById('btn-replay-all').onclick = () => reloadAds();

      // ── fullscreen ────────────────────────────────────────────────

      // ── background switcher ───────────────────────────────────────
      document.querySelectorAll('.bg-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.body.classList.remove('bg-white', 'bg-gray', 'bg-dark');
          document.body.classList.add(btn.dataset.bg);
          localStorage.setItem('adBg', btn.dataset.bg);
        };
      });
      const savedBg = localStorage.getItem('adBg') || 'bg-gray';
      document.body.classList.remove('bg-white', 'bg-gray', 'bg-dark');
      document.body.classList.add(savedBg);
      document.querySelectorAll('.bg-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.bg === savedBg);
      });

      // ── CSV select ────────────────────────────────────────────────
      try {
        const files = await fetchList('csv');
        files.forEach(file => {
          const opt = document.createElement('option');
          opt.value = `csv/${file}`;
          opt.textContent = csvLabel(file);
          csvSelect.appendChild(opt);
        });
      } catch (e) { console.warn('csv list', e); }
      const savedCsv = localStorage.getItem('adCsvPath') || (csvSelect.options[0]?.value ?? '');
      if (savedCsv) csvSelect.value = savedCsv;
      csvSelect.onchange = () => { localStorage.setItem('adCsvPath', csvSelect.value); reloadAds(); };

      // ── Products ──────────────────────────────────────────────────
      productsSelect.value = parseInt(localStorage.getItem('adProducts')) || 3;
      productsSelect.onchange = () => { localStorage.setItem('adProducts', productsSelect.value); reloadAds(); };

      // ── CTA + presets ─────────────────────────────────────────────
      ctaInput.value = localStorage.getItem('adCtaText') || 'Shop Now';
      const applyCta = () => {
        withAdDocs(doc => {
          const span = doc.querySelector('.cta-text');
          const cta  = doc.querySelector('.cta');
          if (span) span.textContent = ctaInput.value;
          if (cta)  cta.style.display = ctaInput.value.trim() ? 'inline-block' : 'none';
        });
      };
      ctaInput.oninput = () => { localStorage.setItem('adCtaText', ctaInput.value); applyCta(); };
      applyCta();

      // ── Header image select ───────────────────────────────────────
      try {
        const files = await fetchList('header_images');
        const none = document.createElement('option');
        none.value = ''; none.textContent = '— none —';
        headerImageSelect.appendChild(none);
        files.forEach(file => {
          const opt = document.createElement('option');
          opt.value = file;
          opt.textContent = file.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
          headerImageSelect.appendChild(opt);
        });
      } catch (e) { console.warn('header_images list', e); }
      headerImageSelect.value = localStorage.getItem('adHeaderImageName') || '';
      headerImageSelect.onchange = () => {
        localStorage.setItem('adHeaderImageName', headerImageSelect.value);
        if (headerImageSelect.value) { headerVideoSelect.value = ''; localStorage.setItem('adHeaderVideoName', ''); }
        withAdDocs(doc => applyCurrentHeaderMedia(doc));
      };

      // ── Header video select ───────────────────────────────────────
      try {
        const files = await fetchList('header_video');
        const none = document.createElement('option');
        none.value = ''; none.textContent = '— none —';
        headerVideoSelect.appendChild(none);
        files.forEach(file => {
          const opt = document.createElement('option');
          opt.value = file;
          opt.textContent = file.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
          headerVideoSelect.appendChild(opt);
        });
      } catch (e) { console.warn('header_video list', e); }
      headerVideoSelect.value = localStorage.getItem('adHeaderVideoName') || '';
      headerVideoSelect.onchange = () => {
        localStorage.setItem('adHeaderVideoName', headerVideoSelect.value);
        if (headerVideoSelect.value) { headerImageSelect.value = ''; localStorage.setItem('adHeaderImageName', ''); }
        withAdDocs(doc => applyCurrentHeaderMedia(doc));
      };

    });
  </script>
</body>
</html>
