<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>300x600 Ad</title>

  <!-- fonts inside ads/300x600/fonts/ -->
  <link rel="preload" href="fonts/Noto IKEA Latin Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/Noto IKEA Latin Bold.woff2" as="font" type="font/woff2" crossorigin>

  <link rel="stylesheet" href="style.css" />

  <script>
    // default values; may be overridden via localStorage
    window.products = 5;
    window.ctaText = "Shop Now";

    // CSV path from root AI_template3/csv/, ad lives in ads/300x600/
    (function () {
      try {
        var saved = window.localStorage && localStorage.getItem('adCsvPath'); // 'csv/...'
        if (saved) {
          var p = saved.replace(/^\.\//, '');
          // from ads/300x600 to AI_template3/csv => ../../csv/...
          window.currentCsvPath = p.indexOf('../') === 0 ? p : '../../' + p;
        } else {
          window.currentCsvPath = '../../csv/ikea-Tables.csv';
        }
      } catch (e) {
        window.currentCsvPath = '../../csv/ikea-Tables.csv';
      }
    })();

    // header image file name (in AI_template3/header_images/)
    (function () {
      try {
        var headerSaved = window.localStorage && localStorage.getItem('adHeaderImageName');
        window.currentHeaderImageName = headerSaved || 'table.jpg';
      } catch (e) {
        window.currentHeaderImageName = 'table.jpg';
      }
    })();

    // number of products (1–5)
    (function () {
      try {
        var savedProducts = window.localStorage && localStorage.getItem('adProducts');
        var n = savedProducts ? parseInt(savedProducts, 10) : window.products;
        if (!n || isNaN(n)) n = 5;
        if (n < 1) n = 1;
        if (n > 5) n = 5;
        window.products = n;
      } catch (e) {
        window.products = 5;
      }
    })();
  </script>
</head>
<body>
  <div id="ad" aria-label="Advertisement - 300 by 600">
    <div class="bg"></div>
    <a id="ad-clickarea" href="" target="_blank" style="position:absolute;top:0;left:0;width:300px;height:600px;z-index:10;display:block;"></a>
    <div class="logo">
      <img src="ikea.svg" alt="IKEA" />
    </div>
    <div class="table-img">
      <!-- default header image from AI_template3/header_images/ -->
      <img src="../../header_images/table.jpg" alt="Header" />
      <video class="header-video" muted playsinline></video>
    </div>
    <div class="media">
      <div class="carousel"></div>
    </div>
    <div class="pagination"></div>
    <div class="cta" aria-label="Call to Action">
      <span class="cta-text"></span>
    </div>
    <div class="nav left" aria-label="Previous">
      <img src="arrow.svg" alt="Previous" />
    </div>
    <div class="nav right" aria-label="Next">
      <img src="arrow.svg" alt="Next" />
    </div>
  </div>

  <!-- GSAP from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="../../lib/dco-ads.js"></script>
  <script src="animation.js"></script>
</body>
</html>
