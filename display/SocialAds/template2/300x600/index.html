<script type="text/javascript">
    $('#ad').style.width = WIDTH + "px";
    $('#ad').style.height = HEIGHT + "px";

    var queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    let dynamicData = {};
    urlParams.forEach((value, key) => {
        dynamicData[key] = value;
    });

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
        const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
            const cols = [];
            let cur = '', inQ = false;
            for (let c = 0; c < lines[i].length; c++) {
                const ch = lines[i][c];
                if (ch === '"') { inQ = !inQ; }
                else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
                else { cur += ch; }
            }
            cols.push(cur);
            if (cols.length < headers.length) continue;
            const row = {};
            headers.forEach((h, idx) => { row[h] = (cols[idx] || '').trim(); });
            rows.push(row);
        }
        return rows;
    }

    function initAd() {
        grid8player.dynamicData = dynamicData;
        if (dynamicData['showDebug'] == "true" || dynamicData['grid8'] == "true") {
            grid8player.debug(true);
        } else {
            grid8player.init();
        }
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    if (!dynamicData['s0_card_1'] && !dynamicData['s0_card_2'] && !dynamicData['s0_card_3']) {
        fetch(feed)
            .then(r => r.text())
            .then(text => {
                const rows = parseCSV(text).filter(r => r['image'] && r['image'].startsWith('http'));
                const picked = shuffleArray(rows.slice()).slice(0, 5);

                // image assignments
                if (picked[0]) dynamicData['s0_card_1'] = picked[0]['image'];
                if (picked[1]) dynamicData['s0_card_2'] = picked[1]['image'];
                if (picked[2]) dynamicData['s0_card_3'] = picked[2]['image'];
                if (picked[3]) dynamicData['s0_card_4'] = picked[3]['image'];
                if (picked[4]) dynamicData['s0_card_5'] = picked[4]['image'];

                // price → title assignments
                if (picked[0]) dynamicData['s0_title_1'] = picked[0]['price'];
                if (picked[1]) dynamicData['s0_title_2'] = picked[1]['price'];
                if (picked[2]) dynamicData['s0_title_3'] = picked[2]['price'];
                if (picked[3]) dynamicData['s0_title_4'] = picked[3]['price'];
                if (picked[4]) dynamicData['s0_title_5'] = picked[4]['price'];

                if (picked[0] && !dynamicData['s0_heading_2']) {
                    dynamicData['s0_heading_2'] = picked[0]['price'];
                }
                initAd();
            })
            .catch(() => initAd());
    } else {
        initAd();
    }
</script>
